<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional Font Generator - convert plain text into stylish Unicode fonts instantly.">
    <title>{% block title %}Font Generator{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head_extra %}{% endblock %}
</head>
<body>
    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>
    <div class="bg-orb orb-3" aria-hidden="true"></div>
    <header class="site-header">
        <div class="container header-inner">
            <div class="brand-mark" aria-hidden="true">F</div>
            <div>
                <h1 class="brand-title">Font Generator</h1>
                <p class="brand-subtitle">Generate stylish Unicode text in one tap</p>
            </div>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>&copy; {{ 2026 }} Font Generator. Built for speed and mobile-first UX.</p>
        </div>
    </footer>

    <div class="toast" id="copyToast" role="status" aria-live="polite">Copied!</div>
    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
